<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>{% block title %}Dashboard Karyawan - Smart Wash Laundry{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/smartwash.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/kasir.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet">
</head>
<body>
    <div class="sw-kasir-shell">
        <!-- Overlay (mobile) -->
        <div class="sw-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <aside class="sw-kasir-sidebar" id="kasirSidebar">
            <div class="sw-kasir-logo">
                <div class="sw-brand-mark" aria-label="Smart Wash Laundry">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Smart Wash Laundry Logo" style="width: 240px; height: auto; object-fit: contain; margin-top: 15px;">
                </div>
            </div>

            <div class="sw-kasir-menu">
                <p class="sw-menu-title">Menu Kasir</p>
                <nav class="sw-kasir-nav">
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.dashboard' %}active{% endif %}" href="{{ url_for('karyawan.dashboard') }}">
                        <i class="bi bi-house-door"></i><span>Dashboard</span>
                    </a>
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.transaksi' %}active{% endif %}" href="{{ url_for('karyawan.transaksi') }}">
                        <i class="bi bi-basket2"></i><span>Transaksi Laundry</span>
                    </a>
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.member' %}active{% endif %}" href="{{ url_for('karyawan.member') }}">
                        <i class="bi bi-people-fill"></i><span>Data Pelanggan</span>
                    </a>
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.status' %}active{% endif %}" href="{{ url_for('karyawan.status') }}">
                        <i class="bi bi-arrow-counterclockwise"></i><span>Status Laundry</span>
                    </a>
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.pembayaran' %}active{% endif %}" href="{{ url_for('karyawan.pembayaran') }}">
                        <i class="bi bi-cash-stack"></i><span>Pembayaran</span>
                    </a>
                    <a class="sw-kasir-nav-item {% if request.endpoint == 'karyawan.riwayat' %}active{% endif %}" href="{{ url_for('karyawan.riwayat') }}">
                        <i class="bi bi-clock-history"></i><span>Riwayat Transaksi</span>
                    </a>
                    <a class="sw-kasir-nav-item" href="{{ url_for('auth.logout') }}" style="color:#c0392b; margin-top:20px; border-top:1px solid rgba(0,0,0,0.1); padding-top:20px;">
                        <i class="bi bi-box-arrow-right"></i><span>Log Out</span>
                    </a>
                </nav>
            </div>
        </aside>

        <main class="sw-kasir-main">
            <header class="sw-kasir-topbar">
                <div style="display:flex; align-items:center; gap:14px;">
                    <button class="sw-hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Toggle Menu">
                        <i class="bi bi-list"></i>
                    </button>
                    <h1>{% block page_title %}Beranda{% endblock %}</h1>
                </div>
                <div class="sw-kasir-userbar">
                    <span class="sw-role-pill">Role : Karyawan</span>
                    <div class="sw-user-text">
                        <strong>{{ session.get("nama", "Rina") }}</strong>
                        <span>Karyawan</span>
                    </div>
                    <span class="sw-user-avatar"><i class="bi bi-person-fill"></i></span>
                    <a class="sw-logout-btn" href="{{ url_for('auth.logout') }}">Log Out</a>
                </div>
            </header>

            <div class="sw-kasir-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        {% if 'WhatsApp' in message or 'whatsapp' in message|lower %}
                            Swal.fire({
                                icon: '{{ "success" if category == "success" else "error" if category == "danger" else "info" }}',
                                title: 'Notifikasi',
                                text: '{{ message }}',
                                confirmButtonText: 'OK'
                            });
                        {% else %}
                            // Fallback to basic alert for other messages, inserted at the top of content
                            const alertHtml = `
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            `;
                            document.querySelector('.sw-kasir-content').insertAdjacentHTML('afterbegin', alertHtml);
                        {% endif %}
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        // Mobile Sidebar Toggle JS
        function toggleSidebar() {
            document.getElementById('kasirSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }
        function closeSidebar() {
            document.getElementById('kasirSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
