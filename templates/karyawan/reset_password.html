{% extends "base.html" %}

{% block title %}Reset Password Karyawan - Smart Wash Laundry{% endblock %}

{% block content %}
<div class="sw-form-wrap">
    <section class="sw-modal-card">
        <div class="sw-modal-heading">
            <h1 class="sw-modal-title">
                <span class="sw-modal-title-icon" style="background:#dcdcdc;color:#000;">
                    <i class="bi bi-key-fill"></i>
                </span>
                Reset Password Karyawan
            </h1>
            <a href="{{ url_for('karyawan_admin.index') }}" class="sw-close-link">&times;</a>
        </div>

        <div class="sw-promo-note">
            Mereset kata sandi untuk akun karyawan: <strong>{{ karyawan.nama }} ({{ karyawan.username }})</strong>
        </div>

        <form class="sw-form" method="post">
            <div class="mb-4">
                <label for="password" class="form-label">Password Baru <span class="sw-required">*</span></label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Masukan password baru..." required>
            </div>

            <div class="mb-4">
                <label for="konfirmasi_password" class="form-label">Konfirmasi Password Baru <span class="sw-required">*</span></label>
                <input type="password" class="form-control" id="konfirmasi_password" name="konfirmasi_password" placeholder="Ketik ulang password baru..." required>
            </div>

            <div class="sw-form-actions">
                <a href="{{ url_for('karyawan_admin.index') }}" class="sw-btn-muted px-5">Batal</a>
                <button type="submit" class="sw-btn-primary px-4"><i class="bi bi-save"></i> Simpan Password</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
