<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Smart Wash Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/smartwash.css') }}" rel="stylesheet">
</head>
<body class="sw-login-body">
    <main class="sw-login-bg">
        <section class="sw-login-panel">
            <div class="sw-brand-mark" aria-label="Smart Wash Laundry">
                <div>
                    <span class="brand-bubble"></span>
                    <div class="brand-text">SMART WASH<br>LAUNDRY</div>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="w-100 mb-3">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} py-2 mb-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="sw-login-form" method="post" action="{{ url_for('auth.login') }}">
                <label class="sw-login-control" for="username">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" name="username" placeholder="budi" required autofocus>
                </label>
                <label class="sw-login-control" for="password">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" placeholder="owner01" required>
                </label>
                <button type="submit" class="sw-login-button">LOGIN</button>
            </form>
        </section>
    </main>
</body>
</html>
