<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Login - Smart Wash Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/smartwash.css') }}" rel="stylesheet">
</head>
<body class="sw-login-body">
    <main class="sw-login-bg">
        <section class="sw-login-panel">
            <div class="sw-brand-mark" aria-label="Smart Wash Laundry">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Smart Wash Laundry Logo" style="width: 320px; height: auto; object-fit: contain; transform: scale(1.1); margin-bottom: 20px;">
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="w-100 mb-3">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} py-2 mb-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="sw-login-form" method="post" action="{{ url_for('auth.login') }}">
                <label class="sw-login-control" for="username">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" name="username" required autofocus>
                </label>
                <label class="sw-login-control" for="password">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" required>
                    <i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer; padding: 0 10px;"></i>
                </label>
                <button type="submit" class="sw-login-button">LOGIN</button>
            </form>
        </section>
    </main>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
    </script>
</body>
</html>
