<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - Smart Wash Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .success-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 1.5rem 0;
        }
        .merchant {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <!-- We use SweetAlert for the nice animated checkmark -->
        <script>
            Swal.fire({
                icon: 'success',
                title: 'Pembayaran Berhasil!',
                html: '<div class="amount">{{ amount_formatted }}</div><div class="merchant">Pembayaran QRIS untuk<br><strong>Smart Wash Laundry</strong></div><p class="text-muted small">Silakan tunjukkan layar ini kepada kasir jika diperlukan.</p>',
                showConfirmButton: false,
                allowOutsideClick: false,
                allowEscapeKey: false,
                backdrop: `
                    rgba(255,255,255,1)
                `
            });
        </script>
    </div>

</body>
</html>
