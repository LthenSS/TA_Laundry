<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>{% block title %}Smart Wash Laundry{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/smartwash.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet">
</head>
<body>
    <div class="sw-app-shell">
        <!-- Overlay (mobile) -->
        <div class="sw-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <aside class="sw-sidebar" id="adminSidebar">
            <div class="sw-sidebar-logo">
                <div class="sw-brand-mark" aria-label="Smart Wash Laundry">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Smart Wash Laundry Logo" style="width: 240px; height: auto; object-fit: contain; margin-top: 15px;">
                </div>
            </div>
            <div class="sw-sidebar-menu">
                <p class="sw-menu-title">Menu Utama</p>
                <nav class="sw-nav">
                    <a class="sw-nav-item {% if request.endpoint == 'dashboard.index' %}active{% endif %}" href="{{ url_for('dashboard.index') }}">
                        <i class="bi bi-house-door"></i><span>Dashboard</span>
                    </a>
                    <a class="sw-nav-item {% if request.endpoint and request.endpoint.startswith('layanan.') %}active{% endif %}" href="{{ url_for('layanan.index') }}">
                        <i class="bi bi-hand-index-thumb"></i><span>Kelola Layanan</span>
                    </a>
                    <a class="sw-nav-item {% if request.endpoint and request.endpoint.startswith('karyawan_admin.') %}active{% endif %}" href="{{ url_for('karyawan_admin.index') }}">
                        <i class="bi bi-people-fill"></i><span>Kelola Karyawan</span>
                    </a>
                    <!-- Kelola Member removed from Owner view - Owner only monitors customer statistics via Dashboard -->
                    <a class="sw-nav-item {% if request.endpoint and request.endpoint.startswith('member.') %}active{% endif %}" href="{{ url_for('member.index') }}">
                        <i class="bi bi-person-lines-fill"></i><span>Daftar Pelanggan</span>
                    </a>
                    <a class="sw-nav-item {% if request.endpoint and request.endpoint.startswith('promo.') %}active{% endif %}" href="{{ url_for('promo.index') }}">
                        <i class="bi bi-tag-fill"></i><span>Kelola Promo</span>
                    </a>
                    <a class="sw-nav-item {% if request.endpoint == 'laporan.index' %}active{% endif %}" href="{{ url_for('laporan.index') }}">
                        <i class="bi bi-file-earmark-bar-graph"></i><span>Laporan</span>
                    </a>
                    <a class="sw-nav-item {% if request.endpoint == 'dashboard.riwayat' %}active{% endif %}" href="{{ url_for('dashboard.riwayat') }}">
                        <i class="bi bi-arrow-counterclockwise"></i><span>Riwayat Transaksi</span>
                    </a>
                    <a class="sw-nav-item" href="{{ url_for('auth.logout') }}" style="color:#c0392b; margin-top:20px; border-top:1px solid rgba(0,0,0,0.1); padding-top:20px;">
                        <i class="bi bi-box-arrow-right"></i><span>Log Out</span>
                    </a>
                </nav>
            </div>
        </aside>

        <main class="sw-main">
            <header class="sw-admin-topbar">
                <div class="sw-admin-topbar-left">
                    <button class="sw-hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Toggle Menu">
                        <i class="bi bi-list"></i>
                    </button>
                    <h1>{% block page_title %}Owner Dashboard{% endblock %}</h1>
                </div>
                <div class="sw-kasir-userbar">
                    <div class="sw-user-text text-end">
                        <strong>{{ session.get("nama", "Owner") }}</strong>
                        <span class="d-block text-muted" style="font-size: 13px;">Owner</span>
                    </div>
                    <span class="sw-user-avatar" style="width: 40px; height: 40px; font-size: 24px;"><i class="bi bi-person-fill"></i></span>
                </div>
            </header>
            <div class="sw-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3500,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer);
                            toast.addEventListener('mouseleave', Swal.resumeTimer);
                        }
                    });

                    {% for category, message in messages %}
                        {% set icon = "success" if category == "success" else "error" if category == "danger" else "warning" if category == "warning" else "info" %}
                        {% if 'WhatsApp' in message or 'whatsapp' in message|lower or message|length > 60 %}
                            Swal.fire({
                                icon: '{{ icon }}',
                                title: 'Informasi',
                                text: '{{ message }}',
                                confirmButtonText: 'OK',
                                confirmButtonColor: '#127dae'
                            });
                        {% else %}
                            Toast.fire({
                                icon: '{{ icon }}',
                                title: '{{ message }}'
                            });
                        {% endif %}
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        // Mobile Sidebar Toggle JS
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }
        function closeSidebar() {
            document.getElementById('adminSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
